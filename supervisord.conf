[unix_http_server]
file=/app/supervisor/supervisor.sock

[supervisorctl]
serverurl=unix:///app/supervisor/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface
