name: deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login Azure
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login ACR
        run: |
          docker login omnicharge.azurecr.io \
          -u ${{ secrets.ACR_USERNAME }} \
          -p ${{ secrets.ACR_PASSWORD }}

      - name: Build Image
        run: |
          docker build -t omnicharge.azurecr.io/omni:omni .

      - name: Push Image
        run: |
          docker push omnicharge.azurecr.io/omni:omni

      - name: Deploy
        uses: azure/webapps-deploy@v2
        with:
          app-name: omni
          images: omnicharge.azurecr.io/omni:omni
