      routes:

        # ✅ DOCS ROUTES FIRST
        - id: user-service-docs
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/v3/api-docs
          filters:
            - RewritePath=/api/v1/users/v3/api-docs, /v3/api-docs

        - id: operator-service-docs
