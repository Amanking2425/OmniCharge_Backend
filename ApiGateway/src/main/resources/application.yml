spring:
  application:
    name: api-gateway
  config:
    import: "optional:configserver:"

server:
  max-http-request-header-size: 65536

---
# ── Default profile (Eclipse/local) ──────────────────────
spring:
  config:
    activate:
      on-profile: default
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:

        # ✅ DOCS ROUTES FIRST
        - id: user-service-docs
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/v3/api-docs
          filters:
            - RewritePath=/api/v1/users/v3/api-docs, /v3/api-docs

        - id: operator-service-docs
          uri: lb://operator-service
          predicates:
            - Path=/api/v1/operators/v3/api-docs
          filters:
            - RewritePath=/api/v1/operators/v3/api-docs, /v3/api-docs

        - id: recharge-service-docs
          uri: lb://recharge-service
          predicates:
            - Path=/api/v1/recharges/v3/api-docs
          filters:
            - RewritePath=/api/v1/recharges/v3/api-docs, /v3/api-docs

        - id: payment-service-docs
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/v3/api-docs
          filters:
            - RewritePath=/api/v1/payments/v3/api-docs, /v3/api-docs

        # ✅ NORMAL ROUTES AFTER
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**

        - id: operator-service
          uri: lb://operator-service
          predicates:
            - Path=/api/v1/operators/**

        - id: recharge-service
          uri: lb://recharge-service
          predicates:
            - Path=/api/v1/recharges/**

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**

eureka:
  client:
    initial-instance-info-replication-interval-seconds: 30
    registry-fetch-interval-seconds: 30
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    lease-renewal-interval-in-seconds: 30
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    urls:
      - name: User Service
        url: /api/v1/users/v3/api-docs
      - name: Operator Service
        url: /api/v1/operators/v3/api-docs
      - name: Recharge Service
        url: /api/v1/recharges/v3/api-docs
      - name: Payment Service
        url: /api/v1/payments/v3/api-docs
    urls-primary-name: User Service

---
# ── Docker profile ────────────────────────────────────────
